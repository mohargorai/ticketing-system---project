<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <defs>
        <!-- Gradients for the neon look -->
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- Ticket Path -->
        <path id="ticket" d="M 10 0 L 40 0 C 45 0 50 5 50 10 L 50 40 A 10 10 0 0 0 50 60 L 50 90 C 50 95 45 100 40 100 L 10 100 C 5 100 0 95 0 90 L 0 60 A 10 10 0 0 0 0 40 L 0 10 C 0 5 5 0 10 0 Z" />
    </defs>

    <g filter="url(#glow)">
        <!-- Left Ticket -->
        <use href="#ticket" fill="url(#grad1)" transform="translate(20, 10) rotate(-25 25 50)" opacity="0.9"/>
        <!-- Right Ticket -->
        <use href="#ticket" fill="url(#grad2)" transform="translate(50, 10) rotate(25 25 50)" opacity="0.9" style="mix-blend-mode: screen;"/>
    </g>
</svg>
