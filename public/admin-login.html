<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe | Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=V1">
</head>
<body class="bg-dark text-white">

<header>
    <nav class="navbar bg-warning mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand text-dark fw-bold d-flex align-items-center gap-2">
                <img src="favicon.svg" width="28" height="28" alt="Vibe Logo">
                Vibe Admin Auth
            </span>
            <a href="index.html" class="btn btn-dark btn-sm fw-bold">Back to Main Site</a>
        </div>
    </nav>
</header>

<main class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card p-5 border-0">
                <div class="card-body">
                    <h2 class="text-center mb-4 fw-bold text-white" id="admin-title">Admin Login</h2>
                    
                    <form id="admin-form">
                        <div class="mb-3">
                            <label class="form-label text-light">Admin Username</label>
                            <input type="text" id="admin-username" class="form-control" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-light">Password</label>
                            <div class="position-relative">
                                <input type="password" id="admin-password" class="form-control" required>
                                <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted text-decoration-none" onclick="toggleVisibility('admin-password', this)" tabindex="-1">
                                    <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/></svg>
                                    <svg class="eye-hide d-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/><path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708"/></svg>
                                </button>
                            </div>
                        </div>

                        <div class="mb-4 d-none" id="secret-key-container">
                            <label class="form-label text-warning fw-bold">Admin Secret Key (Required)</label>
                            <div class="position-relative">
                                <input type="password" id="admin-secret" class="form-control border-warning" placeholder="Enter root secret key">
                                <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-muted text-decoration-none" onclick="toggleVisibility('admin-secret', this)" tabindex="-1">
                                    <svg class="eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/></svg>
                                    <svg class="eye-hide d-none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486z"/><path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/><path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708"/></svg>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-warning w-100 fw-bold fs-5" id="admin-btn">Login to Dashboard</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="#" id="toggle-admin-mode" class="text-decoration-none text-info fw-bold">Authorize a new Admin Account?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let isLoginMode = true;
    const adminTitle = document.getElementById('admin-title');
    const adminBtn = document.getElementById('admin-btn');
    const toggleModeBtn = document.getElementById('toggle-admin-mode');
    const secretKeyContainer = document.getElementById('secret-key-container');
    const secretInput = document.getElementById('admin-secret');

    toggleModeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        isLoginMode = !isLoginMode;
        
        if (isLoginMode) {
            adminTitle.innerText = 'Admin Login';
            adminBtn.innerText = 'Login to Dashboard';
            toggleModeBtn.innerText = 'Authorize a new Admin Account?';
            secretKeyContainer.classList.add('d-none');
            secretInput.required = false;
        } else {
            adminTitle.innerText = 'Register Admin';
            adminBtn.innerText = 'Create Admin Account';
            toggleModeBtn.innerText = 'Already an admin? Login here.';
            secretKeyContainer.classList.remove('d-none');
            secretInput.required = true;
        }
    });

    document.getElementById('admin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('admin-username').value;
        const password = document.getElementById('admin-password').value;
        const secretKey = secretInput.value;

        if (isLoginMode) {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            
            if (data.success) {
                if (data.isAdmin) {
                    // 🚨 FIXED: This now redirects properly to the Admin Dashboard
                    window.location.href = 'admin.html'; 
                } else {
                    alert("Access Denied: You are a normal user, not an Admin.");
                    await fetch('/api/logout', { method: 'POST' }); 
                }
            } else {
                alert(data.message || 'Invalid credentials.');
            }
        } else {
            const res = await fetch('/api/admin/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, secretKey })
            });

            const data = await res.json();
            
            if (data.success) {
                alert(data.message);
                toggleModeBtn.click(); 
                document.getElementById('admin-password').value = '';
                secretInput.value = '';
            } else {
                alert(data.message || 'Error creating admin.');
            }
        }
    });
</script>
<!-- Toast Notification Container -->
<div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 11000; margin-top: 10px;"></div>
<script>
function toggleVisibility(id, btn) {
    const input = document.getElementById(id);
    const eyeShow = btn.querySelector('.eye-show');
    const eyeHide = btn.querySelector('.eye-hide');
    if (input.type === 'password') {
        input.type = 'text';
        eyeShow.classList.add('d-none');
        eyeHide.classList.remove('d-none');
    } else {
        input.type = 'password';
        eyeHide.classList.add('d-none');
        eyeShow.classList.remove('d-none');
    }
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    if (!container) return;
    
    let title = 'Notification';
    if(message.includes('✅') || type === 'success') { type = 'success'; title = 'Success'; message = message.replace('✅', '').trim(); }
    else if(message.includes('❌') || message.includes('🛑') || message.includes('⚠️') || type === 'error') { type = 'error'; title = 'Error'; message = message.replace(/[❌🛑⚠️]/g, '').trim(); }
    
    const toastHtml = `
        <div class="toast custom-toast border-0 show" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            <div class="toast-header border-0">
                <span class="toast-indicator ${type}"></span>
                <strong class="me-auto">${title}</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">${message}</div>
        </div>
    `;
    
    const toastWrapper = document.createElement('div');
    toastWrapper.innerHTML = toastHtml;
    const toastEl = toastWrapper.firstElementChild;
    container.appendChild(toastEl);
    
    const bsToast = new bootstrap.Toast(toastEl);
    bsToast.show();
    
    toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
}
</script>
</body>
</html>
