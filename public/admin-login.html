<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe | Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=V1">
</head>
<body class="bg-dark text-white">

<header>
    <nav class="navbar bg-warning mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand text-dark fw-bold d-flex align-items-center gap-2">
                <img src="favicon.svg" width="28" height="28" alt="Vibe Logo">
                Vibe Admin Auth
            </span>
            <a href="index.html" class="btn btn-dark btn-sm fw-bold">Back to Main Site</a>
        </div>
    </nav>
</header>

<main class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card p-5 border-0">
                <div class="card-body">
                    <h2 class="text-center mb-4 fw-bold text-white" id="admin-title">Admin Login</h2>
                    
                    <form id="admin-form">
                        <div class="mb-3">
                            <label class="form-label text-light">Admin Username</label>
                            <input type="text" id="admin-username" class="form-control" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-light">Password</label>
                            <div class="input-group">
                                <input type="password" id="admin-password" class="form-control border-end-0" required>
                                <button class="btn border border-start-0" type="button" id="toggle-admin-password" style="background-color: var(--surface-input); color: var(--text-muted); border-color: #2a2b36 !important;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                        <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                                        <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="mb-4 d-none" id="secret-key-container">
                            <label class="form-label text-warning fw-bold">Admin Secret Key (Required)</label>
                            <input type="password" id="admin-secret" class="form-control border-warning" placeholder="Enter root secret key">
                        </div>

                        <button type="submit" class="btn btn-warning w-100 fw-bold fs-5" id="admin-btn">Login to Dashboard</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="#" id="toggle-admin-mode" class="text-decoration-none text-info fw-bold">Authorize a new Admin Account?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    window.originalAlert = window.alert;
    window.alert = function(msg) {
        const existing = document.getElementById('custom-alert-modal');
        if (existing) existing.remove();
        const modalHtml = `
        <div class="modal fade" id="custom-alert-modal" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
          <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow-lg" style="background: #1e1e1e; border: 1px solid #333 !important; border-radius: 12px;">
              <div class="modal-body text-center p-4">
                <p class="text-white mb-4 mt-2" style="white-space: pre-wrap; font-size: 16px; font-weight: 500;">${msg}</p>
                <button type="button" class="btn btn-warning w-100 rounded-pill fw-bold py-2" data-bs-dismiss="modal">OK</button>
              </div>
            </div>
          </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modalEl = document.getElementById('custom-alert-modal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
        modalEl.addEventListener('hidden.bs.modal', () => { modalEl.remove(); });
    };

    let isLoginMode = true;
    const adminTitle = document.getElementById('admin-title');
    const adminBtn = document.getElementById('admin-btn');
    const toggleModeBtn = document.getElementById('toggle-admin-mode');
    const secretKeyContainer = document.getElementById('secret-key-container');
    const secretInput = document.getElementById('admin-secret');

    toggleModeBtn.addEventListener('click', (e) => {
        e.preventDefault();
        isLoginMode = !isLoginMode;
        
        if (isLoginMode) {
            adminTitle.innerText = 'Admin Login';
            adminBtn.innerText = 'Login to Dashboard';
            toggleModeBtn.innerText = 'Authorize a new Admin Account?';
            secretKeyContainer.classList.add('d-none');
            secretInput.required = false;
        } else {
            adminTitle.innerText = 'Register Admin';
            adminBtn.innerText = 'Create Admin Account';
            toggleModeBtn.innerText = 'Already an admin? Login here.';
            secretKeyContainer.classList.remove('d-none');
            secretInput.required = true;
        }
    });

    document.getElementById('toggle-admin-password').addEventListener('click', () => {
        const passEl = document.getElementById('admin-password');
        const toggleBtn = document.getElementById('toggle-admin-password');
        if (passEl.getAttribute('type') === 'password') {
            passEl.setAttribute('type', 'text');
            toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye-slash" viewBox="0 0 16 16"><path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755l-.709-.708zm-1.89-1.89-1.4-1.4a2.5 2.5 0 0 0-3.5-3.5l-1.4-1.4a4.5 4.5 0 0 1 6.3 6.3zm1.18-1.18-.5.5A13.133 13.133 0 0 1 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8c.058-.087.122-.183.195-.288l1.41-1.41a7.028 7.028 0 0 0-.588 2.79 6 6 0 0 0 5.19 5.86 1.492 1.492 0 0 0 1.25.14c.2-.07.41-.16.63-.26l1.23 1.23a1.5 1.5 0 0 0 1.95-2.26l-1.41-1.41zm-6.07 1.07-1.4-1.4a2.5 2.5 0 0 0 3.5 3.5l-1.4-1.4a1.5 1.5 0 0 1-.7-.7z"/></svg>`;
        } else {
            passEl.setAttribute('type', 'password');
            toggleBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16"><path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/></svg>`;
        }
    });

    document.getElementById('admin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('admin-username').value;
        const password = document.getElementById('admin-password').value;
        const secretKey = secretInput.value;

        if (isLoginMode) {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            
            if (data.success) {
                if (data.isAdmin) {
                    // 🚨 FIXED: This now redirects properly to the Admin Dashboard
                    window.location.href = 'admin.html'; 
                } else {
                    alert("Access Denied: You are a normal user, not an Admin.");
                    await fetch('/api/logout', { method: 'POST' }); 
                }
            } else {
                alert(data.message || 'Invalid credentials.');
            }
        } else {
            const res = await fetch('/api/admin/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, secretKey })
            });

            const data = await res.json();
            
            if (data.success) {
                alert(data.message);
                toggleModeBtn.click(); 
                document.getElementById('admin-password').value = '';
                secretInput.value = '';
            } else {
                alert(data.message || 'Error creating admin.');
            }
        }
    });
</script>
</body>
</html>
